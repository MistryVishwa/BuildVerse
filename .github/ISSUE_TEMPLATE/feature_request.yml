name: Feature request
description: Suggest an improvement to the repo or showcase page
title: "[Feature] "
labels: ["enhancement"]
assignees:
  - MistryVishwa
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
    validations:
      required: false
