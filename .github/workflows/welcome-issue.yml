name: Welcome New Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  welcome-message:
    runs-on: ubuntu-latest
    steps:
      - name: Post Welcome Comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Thank you for raising this issue! We'll look into it as soon as possible. Please ensure that the issue is not a duplicate, and read CONTRIBUTING.md carefully before contributing. Your contributions are highly appreciated! 😊"
            })
